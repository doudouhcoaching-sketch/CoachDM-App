# Supabase project config — Coach DM
# Run `supabase start` to launch the local stack

project_id = "coachdm"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.avatars]
public = true
file_size_limit = "2MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[storage.buckets.progress-photos]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/heic"]

[storage.buckets.foods]
public = true
file_size_limit = "1MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "exp://localhost:8081",
  "coachdm://auth-callback",
  "https://app.coachdm.be"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false

# OAuth providers (optionnel — Apple Sign-In recommandé pour iOS)
[auth.external.apple]
enabled = false
[auth.external.google]
enabled = false
