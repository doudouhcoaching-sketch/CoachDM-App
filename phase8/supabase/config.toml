# ============================================================
# COACH DM — Supabase CLI config
# Path: supabase/config.toml
# ============================================================

project_id = "coachdm-prod"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
max_header_length = 4096

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://app.coachdm.be"
additional_redirect_urls = [
  "https://app.coachdm.be/auth/callback",
  "coachdm://auth/callback",
  "exp://localhost:8081/--/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1m"

# Templates trilingues (à uploader via dashboard ou Management API)
[auth.email.template.confirmation]
subject = "Confirme ton email · Coach DM"
content_path = "./templates/confirmation.html"

[auth.email.template.recovery]
subject = "Réinitialise ton mot de passe · Coach DM"
content_path = "./templates/recovery.html"

[auth.email.template.magic_link]
subject = "Ton lien de connexion · Coach DM"
content_path = "./templates/magic_link.html"

[functions.ai-chat]
verify_jwt = true

[functions.ai-context-builder]
verify_jwt = false  # appelé par pg_cron

[functions.ai-plateau-scan]
verify_jwt = false

[functions.ai-recovery-reco]
verify_jwt = true

[functions.ai-session-suggest]
verify_jwt = true

[functions.stripe-webhook]
verify_jwt = false  # signature Stripe vérifie elle-même

[edge_runtime]
enabled = true
inspector_port = 8083

[experimental]
ipv4_address = []
